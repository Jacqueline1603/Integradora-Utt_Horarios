{% extends 'horarios/base.html' %}

{% block content %}

<h2 class="text-success mb-4">Panel Administrador</h2>

<div class="row">

    <div class="col-md-3">
        <div class="card text-center shadow">
            <div class="card-body">
                <h5 class="card-title">Alumnos</h5>
                <h3>{{ total_alumnos }}</h3>
            </div>
        </div>
    </div>

    <div class="col-md-3">
        <div class="card text-center shadow">
            <div class="card-body">
                <h5 class="card-title">Profesores</h5>
                <h3>{{ total_profesores }}</h3>
            </div>
        </div>
    </div>

    <div class="col-md-3">
        <div class="card text-center shadow">
            <div class="card-body">
                <h5 class="card-title">Materias</h5>
                <h3>{{ total_materias }}</h3>
            </div>
        </div>
    </div>

    <div class="col-md-3">
        <div class="card text-center shadow">
            <div class="card-body">
                <h5 class="card-title">Grupos</h5>
                <h3>{{ total_grupos }}</h3>
            </div>
        </div>
    </div>

</div>

<br>

<a href="/admin/" class="btn btn-success btn-lg">
    Configuración
</a>

{% endblock %}
