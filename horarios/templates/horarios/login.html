<!DOCTYPE html>
<html>

<head>

<title>Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container">

<div class="row justify-content-center mt-5">

<div class="col-md-4">

<div class="card shadow">

<div class="card-body">

<h3 class="text-center text-success">UTT Horarios</h3>

<form method="POST">

{% csrf_token %}

<input type="text" name="username" placeholder="Usuario" class="form-control mb-3">

<input type="password" name="password" placeholder="Contraseña" class="form-control mb-3">

<button class="btn btn-primary w-100">Entrar</button>

</form>

{% if error %}
<p class="text-danger mt-2">{{error}}</p>
{% endif %}

</div>

</div>

</div>

</div>

</div>

</body>

</html>
