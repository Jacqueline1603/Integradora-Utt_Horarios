{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>UTT Horarios</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f5f5f5;
font-family: Arial, Helvetica, sans-serif;
}

/* NAVBAR */
.navbar{
background:#5dab59;
}

/* BOTONES NARANJA */
.btn-primary{
background:#f57c00;
border:none;
}

.btn-primary:hover{
background:#ef6c00;
}

/* BOTON MORADO */
.btn-purple{
background:#6a1b9a;
color:white;
border:none;
}

.btn-purple:hover{
background:#4a148c;
}

/* LOGO */
.logo{
height:60px;
}

/* TARJETAS */
.card{
border-radius:10px;
}

</style>

</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark">

<div class="container">

<div class="d-flex align-items-center">

<img src="{% static 'img/logo.png' %}" class="logo me-3">

<span class="navbar-brand fw-bold">
Sistema de Horarios UTT
</span>

</div>

<div class="ms-auto text-white">

<span class="me-3">
👤 {{ user.username }}
</span>

<a href="/logout/" class="btn btn-light btn-sm">
Cerrar sesión
</a>

</div>

</div>

</nav>

<!-- CONTENIDO -->

<div class="container mt-4">

{% block content %}

{% endblock %}

</div>

</body>

</html>
